<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <button class="rock-btn">Rock</button>
    <button class="paper-btn">Paper</button>
    <button class="scissors-btn">Scissors</button>

    <div class="status">
        <p>you: <span class="human-choice"></span></p>
        <p>computer: <span class="computer-choice"></span></p>
        <p class="human-result">you: <span class="human-score"></span></p>
        <p class="computer-result">computer: <span class="computer-score"></span></p>
    </div>

    <div class="result"></div> 

    <script src="script.js"></script>
</body>
</html>
