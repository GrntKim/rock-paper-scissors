<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <button class="rock-btn">Rock</button>
    <button class="paper-btn">Paper</button>
    <button class="scissors-btn">Scissors</button>

    <p>Round <span class="round">0</span></p>
    <p>you: <span class="human-choice">READY</span></p>
    <p>computer: <span class="computer-choice">READY</span></p>
    <p>you: <span class="human-score">0</span></p>
    <p>computer: <span class="computer-score">0</span></p>
    <script src="script.js"></script>
</body>
</html>
